controller_manager:
  ros__parameters:
    update_rate: 200

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - gripper_left

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    interpolate_from_desired_state: false
    allow_partial_joints_goal: false